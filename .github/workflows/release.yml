# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-2022
  
    steps:
      - name: Checkout
        uses: actions/checkout@v4
  
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
  
      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-root

      - name: Run tests
        shell: pwsh
        run: |
          python -m pytest test

      - name: Resolve package version
        shell: pwsh
        run: |
          if ($env:GITHUB_REF_TYPE -eq "tag") {
            $version = $env:GITHUB_REF_NAME -replace '^v', ''
          } else {
            $version = python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])"
          }
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append
  
      - name: Build with Nuitka
        shell: pwsh
        run: |
          python -m nuitka `
            --standalone `
            --static-libpython=no `
            --assume-yes-for-downloads `
            --output-dir=dist-nuitka `
            --output-filename=city-tier-stats `
            --include-data-files=city_tiers.yaml=city_tiers.yaml `
            city_tier_stats.py
  
      # ✅ 安装 Inno Setup
      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y
  
      # ✅ 生成安装包
      - name: Build Setup.exe
        shell: pwsh
        run: |
          $env:PROJECT_ROOT = "${{ github.workspace }}"
          $env:OUTPUT_DIR = "${{ github.workspace }}\installer\output\windows"
          $env:APP_VERSION = $env:APP_VERSION
      
          iscc installer/windows/installer.iss
  
      # ✅ 上传产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/output/windows/*.exe

  build-macos:
    name: Build macOS Installer
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry config virtualenvs.create false
          poetry install --no-interaction --no-root

      - name: Run tests
        shell: bash
        run: |
          python -m pytest test

      - name: Resolve package version
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "APP_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Build with Nuitka
        shell: bash
        run: |
          python -m nuitka \
            --standalone \
            --static-libpython=no \
            --assume-yes-for-downloads \
            --output-dir=dist-nuitka \
            --output-filename=city-tier-stats \
            --include-data-files=city_tiers.yaml=city_tiers.yaml \
            city_tier_stats.py

      - name: Import macOS signing certificates
        shell: bash
        env:
          APP_CERT_P12_BASE64: ${{ secrets.MACOS_APP_CERT_P12_BASE64 }}
          APP_CERT_PASSWORD: ${{ secrets.MACOS_APP_CERT_PASSWORD }}
          INSTALLER_CERT_P12_BASE64: ${{ secrets.MACOS_INSTALLER_CERT_P12_BASE64 }}
          INSTALLER_CERT_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERT_PASSWORD }}
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          APP_CERT_PATH="$RUNNER_TEMP/app-cert.p12"
          INSTALLER_CERT_PATH="$RUNNER_TEMP/installer-cert.p12"

          printf '%s' "$APP_CERT_P12_BASE64" | /usr/bin/base64 -D > "$APP_CERT_PATH"
          printf '%s' "$INSTALLER_CERT_P12_BASE64" | /usr/bin/base64 -D > "$INSTALLER_CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$APP_CERT_PATH" -P "$APP_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security import "$INSTALLER_CERT_PATH" -P "$INSTALLER_CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          APP_SIGN_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk -F '"' '/Developer ID Application/ { print $2; exit }')"
          INSTALLER_SIGN_IDENTITY="$(security find-identity -v "$KEYCHAIN_PATH" | awk -F '"' '/Developer ID Installer/ { print $2; exit }')"

          if [ -z "$APP_SIGN_IDENTITY" ]; then
            echo "Developer ID Application identity not found in imported certificate." >&2
            exit 1
          fi
          if [ -z "$INSTALLER_SIGN_IDENTITY" ]; then
            echo "Developer ID Installer identity not found in imported certificate." >&2
            exit 1
          fi

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "APP_SIGN_IDENTITY=$APP_SIGN_IDENTITY" >> "$GITHUB_ENV"
          echo "INSTALLER_SIGN_IDENTITY=$INSTALLER_SIGN_IDENTITY" >> "$GITHUB_ENV"

      - name: Sign Nuitka binaries
        shell: bash
        run: |
          set -euo pipefail

          DIST_DIR="dist-nuitka/city_tier_stats.dist"
          while IFS= read -r -d '' file; do
            if file "$file" | grep -q "Mach-O"; then
              codesign --force --options runtime --timestamp --sign "$APP_SIGN_IDENTITY" "$file"
            fi
          done < <(find "$DIST_DIR" -type f -print0)

          while IFS= read -r -d '' file; do
            if file "$file" | grep -q "Mach-O"; then
              codesign --verify --strict --verbose=2 "$file"
            fi
          done < <(find "$DIST_DIR" -type f -print0)

      - name: Build pkg
        shell: bash
        run: |
          chmod +x installer/macos/*.sh
          VERSION="$VERSION" SIGN_IDENTITY="$INSTALLER_SIGN_IDENTITY" SIGN_KEYCHAIN="$KEYCHAIN_PATH" installer/macos/build-pkg.sh

      - name: Notarize and staple pkg
        shell: bash
        env:
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_API_KEY_P8_BASE64: ${{ secrets.MACOS_NOTARY_API_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail

          PKG_PATH="$(find build/macos-pkg -maxdepth 1 -name '*.pkg' -print -quit)"
          if [ -z "$PKG_PATH" ]; then
            echo "No pkg found in build/macos-pkg." >&2
            exit 1
          fi
          if [ -z "$MACOS_NOTARY_KEY_ID" ] || [ -z "$MACOS_NOTARY_ISSUER_ID" ] || [ -z "$MACOS_NOTARY_API_KEY_P8_BASE64" ]; then
            echo "Missing macOS notarization secrets: MACOS_NOTARY_KEY_ID, MACOS_NOTARY_ISSUER_ID, MACOS_NOTARY_API_KEY_P8_BASE64." >&2
            exit 1
          fi

          NOTARY_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${MACOS_NOTARY_KEY_ID}.p8"
          trap 'rm -f "$NOTARY_API_KEY_PATH"' EXIT
          printf '%s' "$MACOS_NOTARY_API_KEY_P8_BASE64" | /usr/bin/base64 -D > "$NOTARY_API_KEY_PATH"
          chmod 600 "$NOTARY_API_KEY_PATH"

          xcrun notarytool submit "$PKG_PATH" \
            --key "$NOTARY_API_KEY_PATH" \
            --key-id "$MACOS_NOTARY_KEY_ID" \
            --issuer "$MACOS_NOTARY_ISSUER_ID" \
            --wait
          xcrun stapler staple "$PKG_PATH"
          xcrun stapler validate "$PKG_PATH"
          pkgutil --check-signature "$PKG_PATH"
          spctl -a -vvv -t install "$PKG_PATH"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer-arm64
          path: build/macos-pkg/*.pkg

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-windows
      - build-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read release metadata
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
            RELEASE_TAG="v${VERSION}"
          fi

          NOTES_FILE="docs/release-notes/${RELEASE_TAG}.md"
          if [ ! -f "$NOTES_FILE" ]; then
            echo "Release note not found: $NOTES_FILE" >&2
            exit 1
          fi

          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "NOTES_FILE=$NOTES_FILE" >> "$GITHUB_ENV"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" \
              --title "$RELEASE_TAG" \
              --notes-file "$NOTES_FILE" \
              --target "$GITHUB_SHA"
            gh release upload "$RELEASE_TAG" release-assets/* --clobber
          else
            gh release create "$RELEASE_TAG" release-assets/* \
              --title "$RELEASE_TAG" \
              --notes-file "$NOTES_FILE" \
              --target "$GITHUB_SHA"
          fi
