# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Python application

on:
  # push:
  #   branches: [ "main" ]
  # pull_request:
  #   branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-2022
  
    steps:
      - name: Checkout
        uses: actions/checkout@v4
  
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
  
      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install nuitka openpyxl pyyaml
  
      - name: Build with Nuitka
        shell: pwsh
        run: |
          python -m nuitka `
            --standalone `
            --static-libpython=no `
            --assume-yes-for-downloads `
            --output-dir=dist-nuitka `
            --output-filename=city-tier-stats `
            --include-data-files=city_tiers.yaml=city_tiers.yaml `
            city_tier_stats.py
  
      # ✅ 安装 Inno Setup
      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y
  
      # ✅ 生成安装包
      - name: Build Setup.exe
        shell: pwsh
        run: |
          $env:PROJECT_ROOT = "${{ github.workspace }}"
          $env:OUTPUT_DIR = "${{ github.workspace }}\installer\output\windows"
      
          iscc installer/windows/installer.iss
  
      # ✅ 上传产物
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/output/windows/*.exe
